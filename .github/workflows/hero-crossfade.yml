name: Hero Cross-Fade Playwright

# Runs the Playwright hero chapter cross-fade + timeline specs on every
# push and pull request. These specs verify:
#   - e2e/hero-chapter-crossfade.spec.ts — both outgoing and incoming
#     chapter overlays render simultaneously with eased opacities
#     summing to ~1 during the 600ms cosine cross-fade.
#   - e2e/hero-chapter-timeline.spec.ts — the active chapter overlay
#     matches the video's currentTime across the full timeline (mid-
#     chapter snapshots + 0.5s invariant sweep).
on:
  pull_request:
  push:
  workflow_dispatch:

# Cancel in-flight runs for the same ref when new commits arrive.
concurrency:
  group: hero-crossfade-${{ github.ref }}
  cancel-in-progress: true

jobs:
  crossfade:
    name: Hero cross-fade (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json', 'bun.lockb') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium + system deps
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      - name: Run hero cross-fade + timeline specs
        run: bunx playwright test e2e/hero-chapter-crossfade.spec.ts e2e/hero-chapter-timeline.spec.ts
        env:
          CI: "true"

      - name: Upload Playwright report (diffs + traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hero-crossfade-report
          path: playwright-report/
          retention-days: 14

      - name: Upload failed snapshot diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hero-crossfade-snapshot-diffs
          path: test-results/
          retention-days: 14
