name: Builder Canvas Regression

# Runs the builder canvas typography & spacing contract suite and
# uploads the per-pass artifact for the back-and-forth selection
# flow (A0 → B → B+detail → A1) so reviewers can open diff.html and
# inspect, pass-by-pass, exactly which landmark drifted on which
# pass — without having to reproduce the user flow locally.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: builder-canvas-regression-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  builder-canvas-regression:
    name: Builder canvas regression (vitest + per-pass diff artifact)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # The back-and-forth test always emits the artifact bundle (pass
      # or fail) under test-output/builder-canvas/back-and-forth/.
      - name: Run builder canvas tests
        id: vitest
        run: bunx vitest run src/__tests__/builder-canvas.test.ts

      - name: Upload builder canvas diff artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: builder-canvas-diff
          path: test-output/builder-canvas/
          if-no-files-found: warn
          retention-days: 14

      - name: Print artifact URL in step summary
        if: always()
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
          STATUS: ${{ steps.vitest.outcome }}
        run: |
          {
            echo "## Builder Canvas Regression"
            echo ""
            echo "**Status:** \`$STATUS\`"
            echo ""
            PASSES_JSON=test-output/builder-canvas/back-and-forth/passes.json
            if [ -f "$PASSES_JSON" ]; then
              DRIFTED=$(node -e "
                const p = JSON.parse(require('fs').readFileSync('$PASSES_JSON','utf8'));
                const drifted = p.slice(1).filter(x => x.driftFromBaseline && (x.driftFromBaseline.gap || x.driftFromBaseline.header || x.driftFromBaseline.firstCard));
                console.log(drifted.length);
              ")
              TOTAL=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$PASSES_JSON','utf8')).length)")
              echo "**Back-and-forth flow:** $TOTAL passes recorded · **$DRIFTED** drifted vs. baseline (A0)"
              echo ""
              if [ "$DRIFTED" -gt 0 ]; then
                echo "<details><summary>Drift summary (click to expand)</summary>"
                echo ""
                echo '```json'
                node -e "
                  const p = JSON.parse(require('fs').readFileSync('$PASSES_JSON','utf8'));
                  console.log(JSON.stringify(p.map(x => ({ name: x.name, gap: x.gap, drift: x.driftFromBaseline })), null, 2));
                "
                echo '```'
                echo "</details>"
                echo ""
              fi
            fi
            if [ -n "$ARTIFACT_URL" ]; then
              echo "**📊 Open the per-pass diff report:** [builder-canvas-diff artifact]($ARTIFACT_URL)"
              echo ""
              echo "Download the artifact and open \`back-and-forth/diff.html\` to see each pass (A0, B, B+detail, A1) as a card with header + first-card landmarks. Cells that drift vs. the A0 baseline are highlighted in red, with the baseline value available on hover."
            else
              echo "_Artifact URL not available (artifact upload may have been skipped)._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
