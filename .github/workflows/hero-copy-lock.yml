name: Hero Copy Lock
# Touched 2026-04-27 to trigger an initial run so GitHub registers the
# two job names (`Vitest — source-level byte-exact lock` and
# `Playwright — hero copy byte-exact DOM lock`) as selectable status
# checks in branch-protection rules. Safe to delete on the next edit.

# Runs the hero-copy guards on every pull request:
#   1. Vitest source-level byte-exact lock (src/content/hero-copy.test.ts)
#      — fast, browser-less, fails the moment HERO_COPY drifts from
#      HERO_COPY_SPEC. Failure output includes the precise codepoint
#      diff between actual and expected.
#   2. Playwright DOM byte-exact lock (e2e/hero-copy-byte-exact.spec.ts)
#      — boots the dev server and asserts each [data-hero-field]
#      textContent equals the spec byte-for-byte. Uses Playwright's
#      `github` reporter (configured in playwright.config.ts when
#      CI=true), which converts each failed assertion into an inline
#      pull-request annotation — so the byte-diff message lands in the
#      PR "Files changed" view next to the failing line.
#
# Wire this workflow as a required status check in branch protection so
# any drift in approved hero wording blocks merges.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      qa_report_retention_days:
        description: "Retention (days) for hero-copy QA JSON reports. GitHub max is 90."
        required: false
        default: "14"
      qa_logs_retention_days:
        description: "Retention (days) for hero-copy QA logs (stdout/stderr + exit code + meta.json). Falls back to qa_report_retention_days when empty. GitHub max is 90."
        required: false
        default: ""
      qa_meta_retention_days:
        description: "Retention (days) for the run metadata (meta.json) artifact. Falls back to qa_logs_retention_days, then qa_report_retention_days. GitHub max is 90."
        required: false
        default: ""

# Cancel in-flight runs for the same PR when new commits are pushed.
concurrency:
  group: hero-copy-lock-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Vitest — source-level byte-exact lock
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Vitest suite
        # The full suite is small and fast; running it (not just the
        # hero-copy file) catches any sibling unit regression introduced
        # alongside a hero-copy edit. Vitest's default reporter prints
        # the throw-message body — including our `describeFirstDiff`
        # codepoint dump — verbatim into the job log on failure.
        run: bun run test
        env:
          CI: "true"

  e2e:
    name: Playwright — hero copy byte-exact DOM lock
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit
    # Run the DOM lock even if unit tests passed; if unit tests fail we
    # already know copy is broken at the source — no point spinning up
    # a browser. `needs: unit` enforces that ordering.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json', 'bun.lockb') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium + system deps
        # Always install OS deps (cache only covers the browser binary).
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      - name: Run hero copy byte-exact spec
        # Playwright's `github` reporter (set in playwright.config.ts
        # when CI=true) emits ::error::file=...,line=... annotations for
        # every failed expect(), with the FULL message body — meaning
        # our `describeFirstDiff` output (e.g. "first divergence at
        # index 12: actual=U+201C vs expected=U+0022") shows up inline
        # in the PR "Files changed" view next to the offending source
        # line. Do NOT pass --reporter on the CLI here — that overrides
        # the config and drops the github reporter.
        run: bunx playwright test e2e/hero-copy-byte-exact.spec.ts
        env:
          CI: "true"

      - name: Upload Playwright report (traces + DOM snapshots)
        # On failure the report includes a full DOM snapshot of the
        # rendered hero, so reviewers can see exactly what shipped vs
        # what the spec expected even after the runner is gone.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hero-copy-playwright-report
          path: playwright-report/
          retention-days: 14

  qa-report:
    name: hero-copy-qa — preview/prod drift JSON report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Independent of unit/e2e: the source-level lock can pass while a
    # deployed environment still drifts (cached HTML, stale build, CDN
    # purge lag), so this job runs in parallel and produces a CI-grade
    # JSON artifact regardless of the byte-exact lock outcome.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate retention-days inputs (cap at GitHub 90-day max)
        # Fail fast — BEFORE running the QA script, installing deps, or
        # producing any artifacts — if any retention input is outside
        # GitHub's allowed range (1..90 days). Otherwise the job runs
        # for minutes only to crash inside actions/upload-artifact@v4
        # with a generic "retention days cannot be greater than the
        # maximum allowed retention" error, wasting CI time AND losing
        # the artifacts we wanted to upload.
        #
        # Rules per input (all three independently validated):
        #   - empty string  → OK (means "use the fallback chain")
        #   - integer 1..90 → OK
        #   - anything else → fail fast with a clear, actionable message
        #     pointing at the exact input name and offending value.
        #
        # Skipped for non-workflow_dispatch events (push / pull_request)
        # because the inputs context is unavailable there and the
        # defaults are hard-coded to safe values (14).
        #
        # All validation rules / constants / messages live in
        # scripts/ci/retention-lib.sh — DO NOT inline them here. The
        # post-precedence validator below sources the SAME library so
        # the two steps cannot drift.
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          QA_REPORT_RETENTION: ${{ inputs.qa_report_retention_days }}
          QA_LOGS_RETENTION:   ${{ inputs.qa_logs_retention_days }}
          QA_META_RETENTION:   ${{ inputs.qa_meta_retention_days }}
        run: |
          set -e
          # shellcheck source=scripts/ci/retention-lib.sh
          source scripts/ci/retention-lib.sh

          FAILED=0
          retention_validate_input "qa_report_retention_days" "$QA_REPORT_RETENTION" || FAILED=1
          retention_validate_input "qa_logs_retention_days"   "$QA_LOGS_RETENTION"   || FAILED=1
          retention_validate_input "qa_meta_retention_days"   "$QA_META_RETENTION"   || FAILED=1

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "One or more retention-days inputs are invalid. See the ::error annotations above."
            echo "GitHub allows 1..$RETENTION_MAX days for actions/upload-artifact@v4."
            exit 1
          fi
          echo ""
          echo "All retention inputs valid (≤ $RETENTION_MAX days)."


      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pin emitter schema (offline)
        # Air-gapped sanity check: --report-json-schema makes no network
        # calls, prints the validator schema, and exits 0. We assert the
        # schema name BEFORE running the network preflight so a bumped
        # contract fails this job loudly even if production is down.
        run: |
          SCHEMA="$(node scripts/hero-copy-qa.mjs --report-json-schema | jq -r .schema)"
          echo "Emitter schema: $SCHEMA"
          test "$SCHEMA" = "hero-copy-qa@1"

      - name: Run hero-copy QA (strict, JSON to file)
        # --report-json-strict turns any silent emitter divergence into
        # EXIT.RUNTIME_ERROR (3) so a malformed report can never be
        # uploaded as if it were valid. The JSON file is uploaded below
        # regardless of exit code via `if: always()`.
        #
        # We tee stdout + stderr to separate log files for triage. The
        # script's real exit code is captured via PIPESTATUS[0] (tee
        # would otherwise mask a non-zero exit and let drift slip
        # through as a green check). The exit code itself is also
        # written to disk so reviewers downloading the logs artifact
        # see the precise EXIT.* without needing the GitHub UI.
        run: |
          mkdir -p qa-reports qa-logs
          set +e
          node scripts/hero-copy-qa.mjs \
            --report-json=qa-reports/hero-copy-qa.json \
            --report-json-strict \
            > >(tee qa-logs/stdout.log) \
            2> >(tee qa-logs/stderr.log >&2)
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "$EXIT_CODE" > qa-logs/exit-code.txt
          echo "hero-copy-qa exit code: $EXIT_CODE"
          exit "$EXIT_CODE"
        env:
          CI: "true"

      - name: Write run metadata (qa-meta/meta.json + qa-logs/meta.json)
        # Bundles GitHub run context next to the script logs so a
        # downloaded artifact is self-describing — no need to cross-
        # reference the GitHub UI to know which commit/workflow/runner
        # produced these logs. Always runs (even on QA failure) so the
        # metadata exists for the most interesting (failing) runs.
        # `mkdir -p` is defensive: if the QA step crashed before the
        # earlier mkdir we still want to ship metadata.
        # `jq -n --arg` is used (rather than a heredoc) so any quirky
        # characters in branch names / actor handles are JSON-escaped
        # correctly.
        #
        # The metadata is written to BOTH `qa-meta/` (uploaded as its
        # own artifact with independent retention) AND `qa-logs/` (kept
        # for back-compat with consumers that already read meta.json
        # from the logs artifact). The two copies are byte-identical.
        if: always()
        run: |
          mkdir -p qa-logs qa-meta
          EXIT_CODE="$(cat qa-logs/exit-code.txt 2>/dev/null || echo unknown)"
          jq -n \
            --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg workflow    "${{ github.workflow }}" \
            --arg job         "${{ github.job }}" \
            --arg runId       "${{ github.run_id }}" \
            --arg runNumber   "${{ github.run_number }}" \
            --arg runAttempt  "${{ github.run_attempt }}" \
            --arg eventName   "${{ github.event_name }}" \
            --arg ref         "${{ github.ref }}" \
            --arg refName     "${{ github.ref_name }}" \
            --arg sha         "${{ github.sha }}" \
            --arg actor       "${{ github.actor }}" \
            --arg repository  "${{ github.repository }}" \
            --arg runnerOS    "${{ runner.os }}" \
            --arg runnerArch  "${{ runner.arch }}" \
            --arg nodeVersion "$(node --version)" \
            --arg bunVersion  "$(bun --version 2>/dev/null || echo unavailable)" \
            --arg exitCode    "$EXIT_CODE" \
            '{
              schema: "hero-copy-qa-meta@1",
              generatedAt: $generatedAt,
              github: {
                workflow:   $workflow,
                job:        $job,
                runId:      $runId,
                runNumber:  $runNumber,
                runAttempt: $runAttempt,
                eventName:  $eventName,
                ref:        $ref,
                refName:    $refName,
                sha:        $sha,
                actor:      $actor,
                repository: $repository
              },
              runner: {
                os:   $runnerOS,
                arch: $runnerArch
              },
              versions: {
                node: $nodeVersion,
                bun:  $bunVersion
              },
              qa: {
                exitCode: $exitCode
              }
            }' > qa-meta/meta.json
          cp qa-meta/meta.json qa-logs/meta.json
          echo "Wrote qa-meta/meta.json (also copied to qa-logs/meta.json):"
          cat qa-meta/meta.json

      - name: Summarize QA report (qa-logs/summary.json)
        # Distills the full hero-copy-qa@1 report into a compact triage
        # summary so reviewers don't have to grep the full JSON / logs to
        # answer "what failed and where?". Captured fields:
        #   - exitCode / exitName (mirrored from qa-logs/exit-code.txt;
        #     falls back to the report's own exitCode/exitName)
        #   - totals: { drift, fetchFailed, manual, ok, targets }
        #   - failingTargets: array of { name, url, status, driftKeys }
        #     for any target whose status is not "ok" — these are the
        #     "page IDs" reviewers click first.
        #   - driftKeys: flat union of every driftKeys[] across targets
        #     (deduped) so a single grep tells you which copy fields
        #     drifted across the whole run.
        #
        # Tolerant of missing / malformed input: if the report file is
        # absent (hard crash before first emit) or unparseable, we still
        # emit a well-formed summary stub with `reportPresent: false`
        # and the exit code from disk — so consumers can rely on the
        # file always existing in the logs artifact.
        if: always()
        run: |
          mkdir -p qa-logs
          REPORT="qa-reports/hero-copy-qa.json"
          EXIT_CODE="$(cat qa-logs/exit-code.txt 2>/dev/null || echo unknown)"
          if [ -s "$REPORT" ] && jq empty "$REPORT" >/dev/null 2>&1; then
            jq \
              --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg exitCodeStr "$EXIT_CODE" \
              '{
                schema: "hero-copy-qa-summary@1",
                generatedAt: $generatedAt,
                reportPresent: true,
                reportSchema: .schema,
                reportTs: .ts,
                mode: .mode,
                runIndex: .runIndex,
                exitCode: (try ($exitCodeStr | tonumber) catch .exitCode),
                exitName: .exitName,
                filter: .filter,
                totals: {
                  targets:     (.targets | length),
                  ok:          ([.targets[] | select(.status == "ok")]          | length),
                  drift:       (.totals.drift       // 0),
                  fetchFailed: (.totals.fetchFailed // 0),
                  manual:      (.totals.manual      // 0)
                },
                failingTargets: [
                  .targets[]
                  | select(.status != "ok")
                  | { name, url, status, driftKeys: (.driftKeys // []) }
                ],
                driftKeys: [
                  .targets[]?.driftKeys[]?
                ] | unique
              }' "$REPORT" > qa-logs/summary.json
          else
            echo "::warning::hero-copy-qa report missing or unparseable at $REPORT — emitting summary stub"
            jq -n \
              --arg generatedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg exitCodeStr "$EXIT_CODE" \
              --arg reportPath  "$REPORT" \
              '{
                schema: "hero-copy-qa-summary@1",
                generatedAt: $generatedAt,
                reportPresent: false,
                reportPath: $reportPath,
                exitCode: (try ($exitCodeStr | tonumber) catch $exitCodeStr),
                exitName: "UNKNOWN",
                totals: { targets: 0, ok: 0, drift: 0, fetchFailed: 0, manual: 0 },
                failingTargets: [],
                driftKeys: []
              }' > qa-logs/summary.json
          fi
          echo "Wrote qa-logs/summary.json:"
          cat qa-logs/summary.json

      - name: Resolve & validate effective retention (post-precedence)
        # Defence-in-depth: the per-input validator above only checks the
        # raw user inputs. This step recomputes each artifact's effective
        # retention via the SAME precedence chain used by the upload
        # steps, then revalidates 1..90 — catching the case where:
        #   • a future edit raises the literal default above 90;
        #   • a new fallback source is added that points at an
        #     unvalidated value;
        #   • the precedence expression is mistyped and silently picks
        #     up something out-of-band.
        #
        # The resolved values are exposed as step outputs (`report`,
        # `logs`, `meta`), and the three upload steps below consume
        # those outputs instead of re-evaluating the precedence
        # expression — so there is exactly ONE source of truth for the
        # effective retention, and it has been validated.
        id: retention
        if: always()
        env:
          QA_REPORT_RETENTION: ${{ inputs.qa_report_retention_days }}
          QA_LOGS_RETENTION:   ${{ inputs.qa_logs_retention_days }}
          QA_META_RETENTION:   ${{ inputs.qa_meta_retention_days }}
        run: |
          set -e
          MAX=90
          DEFAULT=14
          FAILED=0

          # Precedence chains, mirrored from the upload steps:
          #   report:  QA_REPORT_RETENTION                                       || DEFAULT
          #   logs:    QA_LOGS_RETENTION   || QA_REPORT_RETENTION                || DEFAULT
          #   meta:    QA_META_RETENTION   || QA_LOGS_RETENTION || QA_REPORT_RETENTION || DEFAULT
          first_nonempty() {
            for v in "$@"; do
              if [ -n "$v" ]; then
                printf '%s' "$v"
                return 0
              fi
            done
            printf '%s' "$DEFAULT"
          }

          REPORT_EFF="$(first_nonempty "$QA_REPORT_RETENTION")"
          LOGS_EFF="$(first_nonempty "$QA_LOGS_RETENTION"   "$QA_REPORT_RETENTION")"
          META_EFF="$(first_nonempty "$QA_META_RETENTION"   "$QA_LOGS_RETENTION" "$QA_REPORT_RETENTION")"

          revalidate() {
            local name="$1"
            local value="$2"
            if ! printf '%s' "$value" | grep -Eq '^[1-9][0-9]*$'; then
              echo "::error title=Resolved retention is not a positive integer::$name resolved to '$value' after precedence (default=$DEFAULT). This is a workflow bug — the fallback chain produced a non-numeric value."
              FAILED=1
              return 0
            fi
            if [ "$value" -gt "$MAX" ]; then
              echo "::error title=Resolved retention exceeds GitHub maximum::$name resolved to '$value' day(s) after precedence, which exceeds GitHub's hard cap of $MAX. Lower the corresponding input or the workflow default ($DEFAULT)."
              FAILED=1
              return 0
            fi
            echo "✓ effective $name: $value day(s)"
          }

          revalidate "hero-copy-qa-report retention" "$REPORT_EFF"
          revalidate "hero-copy-qa-logs   retention" "$LOGS_EFF"
          revalidate "hero-copy-qa-meta   retention" "$META_EFF"

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Refusing to upload artifacts: at least one effective retention value is invalid."
            echo "GitHub allows 1..$MAX days for actions/upload-artifact@v4."
            exit 1
          fi

          echo "report=$REPORT_EFF" >> "$GITHUB_OUTPUT"
          echo "logs=$LOGS_EFF"     >> "$GITHUB_OUTPUT"
          echo "meta=$META_EFF"     >> "$GITHUB_OUTPUT"
          echo ""
          echo "All effective retentions valid; uploads will use:"
          echo "  hero-copy-qa-report : $REPORT_EFF day(s)"
          echo "  hero-copy-qa-logs   : $LOGS_EFF day(s)"
          echo "  hero-copy-qa-meta   : $META_EFF day(s)"

      - name: Upload hero-copy QA JSON report
        # Always upload — drift, fetch failures, and runtime errors are
        # exactly the cases where the JSON is most useful for triage.
        # Retention is configurable from `workflow_dispatch` (default 14
        # days); the effective value is resolved & validated by the
        # `retention` step above and consumed here as `outputs.report`.
        #
        # `if-no-files-found: ignore` because a hard runtime crash before
        # the first emit leaves no JSON on disk — we don't want a noisy
        # "no files found" warning competing with the real failure in
        # the logs artifact below.
        #
        # Guard: `always() && steps.retention.outcome == 'success'`
        # auto-skips this upload whenever the post-precedence retention
        # validator failed — even if the job continues for any reason
        # (e.g., a future `continue-on-error: true`, a manually edited
        # rerun, or a downstream step that swallows the failure). The
        # `always()` half preserves the triage value of uploading on QA
        # drift / fetch errors; the `outcome == 'success'` half is the
        # explicit early-return for invalid retention.
        if: always() && steps.retention.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: hero-copy-qa-report
          path: qa-reports/hero-copy-qa.json
          retention-days: ${{ steps.retention.outputs.report }}
          if-no-files-found: ignore

      - name: Upload hero-copy QA logs (stdout/stderr + exit code)
        # Separate artifact so triage doesn't have to download the JSON
        # to read the human-readable log, and vice versa. Captures the
        # full stderr stream — which is where --report-json=<path> sends
        # the human log when stdout is being used for machine output —
        # plus the exit code file written above. Always uploaded so a
        # crashing/empty-JSON run still ships its log trail.
        #
        # Effective retention (after qa_logs_retention_days →
        # qa_report_retention_days → 14 precedence) comes from the
        # validated `retention` step output `logs`. Same guard as the
        # report upload above: skipped iff retention validation failed.
        if: always() && steps.retention.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: hero-copy-qa-logs
          path: qa-logs/
          retention-days: ${{ steps.retention.outputs.logs }}
          if-no-files-found: warn

      - name: Upload hero-copy QA run metadata (meta.json)
        # Standalone artifact for the run metadata. Tooling that only
        # needs the GitHub run context (commit SHA, workflow, runner,
        # node/bun versions, exit code) can fetch this single small
        # JSON without downloading the full logs tarball.
        #
        # Effective retention (after qa_meta_retention_days →
        # qa_logs_retention_days → qa_report_retention_days → 14
        # precedence) comes from the validated `retention` step output
        # `meta`. Metadata is the cheapest artifact and most useful for
        # long-term audit trails, so it's typically set to the longest
        # retention of the three. Same guard as the report upload above:
        # skipped iff retention validation failed.
        if: always() && steps.retention.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: hero-copy-qa-meta
          path: qa-meta/meta.json
          retention-days: ${{ steps.retention.outputs.meta }}
          if-no-files-found: warn

      - name: Notify when artifact uploads were skipped
        # Companion to the guard above: when the retention validator
        # failed, all three uploads are auto-skipped (no artifacts at
        # all). This step makes that consequence loud and unambiguous
        # in the job log — otherwise a reviewer scanning the run would
        # see "step skipped" three times with no obvious reason.
        if: always() && steps.retention.outcome != 'success'
        run: |
          echo "::warning title=Artifact uploads skipped::Retention validation did not succeed (outcome=${{ steps.retention.outcome }}); hero-copy-qa-report, hero-copy-qa-logs, and hero-copy-qa-meta were NOT uploaded for this run. Fix the retention input(s) and re-run the workflow."
          exit 1

