          # Write body to a file so jq slurps it safely (newlines, quotes, em-dashes).
          printf '%s' "$BODY" > comment-body.md

          # Find an existing comment with our marker.
          EXISTING_ID=$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/issues/${PR_NUMBER}/comments?per_page=100" \
              --paginate \
              --jq "[.[] | select(.body | contains(\"${MARKER}\"))][0].id // empty"
          )

          if [ -n "$EXISTING_ID" ]; then
            echo "Updating existing comment ${EXISTING_ID}"
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/issues/comments/${EXISTING_ID}" \
              -F body=@comment-body.md > /dev/null
          else
            echo "Creating new sticky comment on PR #${PR_NUMBER}"
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -F body=@comment-body.md > /dev/null
          fi

      - name: Re-assert enforcer exit code
        # Restores the original pass/fail signal of the enforcer step
        # AFTER the comment has been posted, so PR authors always see
        # the drift comment even when the job is failing. Exit codes:
        #   0  in sync / repaired
        #   1  drift in MODE=check
        #   2  setup error
        env:
          EXIT_CODE: ${{ steps.enforce.outputs.exit_code }}
        run: |
          if [ "$EXIT_CODE" != "0" ]; then
            echo "Enforcer exited with code ${EXIT_CODE} — failing job."
            exit "$EXIT_CODE"
          fi
          echo "Enforcer in sync — job passes."

  # ─────────────────────────────────────────────────────────────────
  # Downstream branching on URL-validation outcome.
  #
  # All three jobs gate on `needs.enforce.outputs.url_validation_exit_code`
  # (the numeric exit code, never the log) so they react precisely
  # without parsing free-form text:
  #   0   → url-validation-passed
  #   11  → url-validation-phase1-failure-handler
  #   12  → url-validation-phase2-failure-handler
  #   13  → BOTH handlers run (currently unreachable; reserved for the
  #         day the early-exit guard is relaxed)
  #
  # `if: always()` is mandatory — the `enforce` job is marked `failure`
  # whenever validation fails (the comment step exits 11/12/13), and the
  # default `needs:` semantics would otherwise skip every consumer.
  # The `needs.enforce.result != 'skipped'` guard avoids spurious
  # branching when the entire enforce job was skipped (e.g. workflow
  # filtered out by path/branch rules upstream).
  # ─────────────────────────────────────────────────────────────────

  url-validation-exit-code-guard:
    # Trip-wire that runs BEFORE any of the three branching handlers and
    # asserts `needs.enforce.outputs.url_validation_exit_code` is one of
    # the four documented values: '0' (pass), '11' (phase-1 fail),
    # '12' (phase-2 fail), or '13' (both). Any other value (empty, "1",
    # "2", "abc", etc.) means the contract between the `comment` step
    # and downstream consumers is broken — fail loudly here so the bug
    # surfaces in CI immediately, instead of silently skipping every
    # handler (which is what would happen if a stale/empty value flowed
    # through to the equality checks below).
    #
    # Each handler lists this guard in its `needs:` so GHA evaluates the
    # handler's `if:` expression only AFTER the guard has produced a
    # verdict. `if: always()` on the handlers preserves the original
    # behaviour (they still run when `enforce` is `failure`), but the
    # guard short-circuits the whole branch when the value is invalid.
    name: URL validation exit code guard (contract check)
    needs: enforce
    if: always() && needs.enforce.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Assert exit code is in the documented set
        env:
          EXIT_CODE: ${{ needs.enforce.outputs.url_validation_exit_code }}
        run: |
          set -euo pipefail
          echo "Observed url_validation_exit_code: \"${EXIT_CODE:-<empty>}\""
          case "${EXIT_CODE}" in
            0|11|12|13)
              echo "✅ Exit code \"${EXIT_CODE}\" is in the documented set {0,11,12,13}."
              ;;
            "")
              echo "❌ url_validation_exit_code is EMPTY — the comment step in the"
              echo "   enforce job did not write the output, or the output was not"
              echo "   exposed at the job level. Check:"
              echo "     1. steps.comment.id is 'comment'"
              echo "     2. enforce.outputs.url_validation_exit_code maps to it"
              echo "     3. the comment step actually reached the GITHUB_OUTPUT write"
              exit 1
              ;;
            *)
              echo "❌ url_validation_exit_code \"${EXIT_CODE}\" is NOT in the documented"
              echo "   set {0,11,12,13}. The comment step's exit-code mapping has drifted"
              echo "   from the contract — update both the producer (comment step) and"
              echo "   every consumer's if: clause together."
              exit 1
              ;;
          esac

  url-validation-passed:
    name: URL validation passed (post-validation hook)
    needs: [enforce, url-validation-exit-code-guard]
    if: |
      always()
      && needs.enforce.result != 'skipped'
      && needs.url-validation-exit-code-guard.result == 'success'
      && needs.enforce.outputs.url_validation_exit_code == '0'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Acknowledge clean validation
        env:
          STATUS: ${{ needs.enforce.outputs.url_validation_status }}
        run: |
          echo "✅ URL validation passed (status=${STATUS}, exit_code=0)."
          echo "Downstream consumers can safely trust the deep-links in the PR comment."

  url-validation-phase1-failure-handler:
    name: URL validation — phase 1 failure handler
    needs: [enforce, url-validation-exit-code-guard]
    # Triggers on phase-1-only (11) AND combined (13). Numeric compare
    # via string equality is intentional — GitHub Actions expression
    # context coerces both sides to strings. Gated on the guard so a
    # bogus exit code (e.g. empty, "1") cannot accidentally trigger
    # this handler via the equality check.
    if: |
      always()
      && needs.enforce.result != 'skipped'
      && needs.url-validation-exit-code-guard.result == 'success'
      && (needs.enforce.outputs.url_validation_exit_code == '11'
          || needs.enforce.outputs.url_validation_exit_code == '13')
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Report foundational-input failure
        env:
          EXIT_CODE: ${{ needs.enforce.outputs.url_validation_exit_code }}
          RULES:     ${{ needs.enforce.outputs.url_validation_phase1_rules }}
        run: |
          echo "❌ Phase-1 (foundational inputs) failed."
          echo "   exit_code      : ${EXIT_CODE}"
          echo "   failed rules   : ${RULES}"
          echo "   remediation    : fix HEAD_SHA / REPO / SERVER_URL plumbing."
          echo "   See the enforce job's 'URL validation results' block for full diagnostics."
          # Non-zero so this handler shows red in the checks UI — the
          # presence of a failing handler tells reviewers exactly which
          # phase tripped without opening logs.
          exit 1

  url-validation-phase2-failure-handler:
    name: URL validation — phase 2 failure handler
    needs: enforce
    # Triggers on phase-2-only (12) AND combined (13).
    if: |
      always()
      && needs.enforce.result != 'skipped'
      && (needs.enforce.outputs.url_validation_exit_code == '12'
          || needs.enforce.outputs.url_validation_exit_code == '13')
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Report URL-shape failure
        env:
          EXIT_CODE:   ${{ needs.enforce.outputs.url_validation_exit_code }}
          ERROR_COUNT: ${{ needs.enforce.outputs.url_validation_phase2_error_count }}
        run: |
          echo "❌ Phase-2 (URL-shape / basename) failed."
          echo "   exit_code      : ${EXIT_CODE}"
          echo "   error count    : ${ERROR_COUNT}"
          echo "   remediation    : fix WORKFLOW_FILE_URL / WORKFLOW_JOB_URL / WORKFLOW_RUNS_URL construction."
          echo "   See the enforce job's 'URL validation results' block for full diagnostics."
          exit 1
