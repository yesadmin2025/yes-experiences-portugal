name: Required-check enforcer

# Verifies AND (when safe) repairs the required-status-check context
# on `main` so it always matches the homepage-structure workflow's
# job `name:`. Companion to `required-check-parity.yml` (read-only).
#
# Behaviour
# ---------
#   pull_request    → MODE=check  (read-only). Fails the PR if drift
#                                  exists, but never writes. This is the
#                                  PR gate.
#   push to main    → MODE=apply  (additive write). On every push to
#                                  main, if the required context is
#                                  missing, add it. Never removes other
#                                  contexts; never touches other
#                                  protection fields.
#   workflow_dispatch → MODE comes from the input (default: check).
#                                  Use this to dry-run from the Actions
#                                  UI before letting it self-heal.
#
# Safety boundaries (also enforced by the script)
# -----------------------------------------------
#   - Uses the granular contexts endpoint (POST .../contexts), not the
#     full-replace PUT .../protection. Cannot wipe review counts,
#     restrictions, signed-commit settings, etc.
#   - Only ADDS the one missing context. Never removes or reorders.
#   - Refuses to run if branch protection isn't configured at all —
#     bootstrapping protection from a workflow is a deliberate human
#     decision, not something to auto-heal.
#   - Apply-mode is gated to push events on `main` so a malicious PR
#     cannot trigger writes.
#
# Auth
# ----
#   - Read mode: BRANCH_PROTECTION_READ_TOKEN — Administration: Read.
#   - Apply mode: BRANCH_PROTECTION_WRITE_TOKEN — Administration:
#     Read and write. Treat this token like a deploy key — anyone who
#     can trigger this workflow with apply mode can reshape branch
#     protection on main.
on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/homepage-structure.yml"
      - ".github/workflows/required-check-enforcer.yml"
      - "scripts/enforce-required-status-context.mjs"
  push:
    branches: [main]
    paths:
      - ".github/workflows/homepage-structure.yml"
      - ".github/workflows/required-check-enforcer.yml"
      - "scripts/enforce-required-status-context.mjs"
  workflow_dispatch:
    inputs:
      mode:
        description: >-
          check (read-only, fail on drift)
          | apply-dry-run (read-only, report what apply WOULD POST)
          | apply (additive write — requires write token)
        required: true
        default: "check"
        type: choice
        options:
          - check
          - apply-dry-run
          - apply

concurrency:
  group: required-check-enforcer-${{ github.ref }}
  cancel-in-progress: false # don't cancel an in-flight write

jobs:
  enforce:
    name: Required-check enforcer (${{ github.event_name == 'push' && 'apply' || (github.event.inputs.mode || 'check') }})
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Hard-cap permissions on the workflow's GITHUB_TOKEN. We grant
    # `pull-requests: write` so the comment step can post/update a
    # sticky drift-status comment on the PR using the default token —
    # no extra secret needed for that. Branch-protection reads/writes
    # still go through BRANCH_PROTECTION_*_TOKEN.
    permissions:
      contents: read
      pull-requests: write
    # Surface the URL-validation outputs at the JOB level so downstream
    # jobs can branch on them via `needs.enforce.outputs.*` without
    # re-running validation or scraping the log. These are written by
    # the `comment` step BEFORE it exits non-zero, so they are
    # populated even on validation failure.
    #
    # IMPORTANT: downstream jobs that consume these MUST set
    # `if: always() && needs.enforce.result != 'skipped'` (or a more
    # specific condition) — the comment step exits with code 11/12/13
    # on URL-validation failure, which marks this job as `failure`,
    # and the default `needs:` semantics would otherwise skip them.
    outputs:
      url_validation_status:            ${{ steps.comment.outputs.url_validation_status }}
      url_validation_exit_code:         ${{ steps.comment.outputs.url_validation_exit_code }}
      url_validation_phase1_failed:     ${{ steps.comment.outputs.url_validation_phase1_failed }}
      url_validation_phase2_failed:     ${{ steps.comment.outputs.url_validation_phase2_failed }}
      url_validation_phase1_rules:      ${{ steps.comment.outputs.url_validation_phase1_rules }}
      url_validation_phase2_error_count: ${{ steps.comment.outputs.url_validation_phase2_error_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (script uses only built-ins)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve mode + token
        id: mode
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            echo "mode=apply" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "mode=${INPUT_MODE:-check}" >> "$GITHUB_OUTPUT"
          else
            # pull_request and any other event default to read-only.
            echo "mode=check" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify / repair required-check context
        id: enforce
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          # Pick the right-scope token for the chosen mode. The write
          # token is only ever exposed to the script when MODE=apply.
          BRANCH_PROTECTION_TOKEN: >-
            ${{ steps.mode.outputs.mode == 'apply'
                && secrets.BRANCH_PROTECTION_WRITE_TOKEN
                || secrets.BRANCH_PROTECTION_READ_TOKEN }}
          PROTECTED_BRANCH: main
          WORKFLOW_PATH: .github/workflows/homepage-structure.yml
          WORKFLOW_JOB_KEY: homepage-structure
        # Capture combined stdout+stderr to a file AND echo it to the
        # job log, then record the script's exit code as a step output
        # without failing this step. The final "Re-assert exit code"
        # step below will fail the job if needed — the comment step in
        # between needs to run first so PR authors get the diagnostics
        # even when the job is failing.
        run: |
          set +e
          node scripts/enforce-required-status-context.mjs 2>&1 | tee enforcer-output.log
          rc=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${rc}" >> "$GITHUB_OUTPUT"
          # Surface a short headline for the comment template.
          if [ "$rc" = "0" ]; then
            echo "headline=✅ In sync (or repaired)" >> "$GITHUB_OUTPUT"
          elif [ "$rc" = "1" ]; then
            echo "headline=❌ Drift detected — required-check context missing" >> "$GITHUB_OUTPUT"
          else
            echo "headline=⚠️ Setup error — see job log" >> "$GITHUB_OUTPUT"
          fi

      - name: Post / update PR drift-status comment
        id: comment
        # Only meaningful on pull_request events — push/dispatch runs
        # don't have a PR to comment on. Always runs (even if enforce
        # exited non-zero) so authors see the diagnostics inline.
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MODE: ${{ steps.mode.outputs.mode }}
          HEADLINE: ${{ steps.enforce.outputs.headline }}
          EXIT_CODE: ${{ steps.enforce.outputs.exit_code }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          # Pin source links to the PR's head SHA so the link always
          # points at the exact code under review, not whatever main
          # looks like when someone clicks the link weeks later.
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # Idempotent comment: a hidden HTML marker
        # (<!-- required-check-enforcer -->) lets us find and PATCH the
        # existing comment on subsequent runs instead of spamming the PR.
        run: |
          set -euo pipefail

          MARKER='<!-- required-check-enforcer -->'

          # Single source of truth for the workflow YAML path + job
          # key the comment links to. Echoed below AND used to call the
          # resolver, so the banner can never disagree with the link.
          # Keep these in sync with the values passed to the enforcer
          # script in the previous step.
          TARGET_WORKFLOW='.github/workflows/homepage-structure.yml'
          TARGET_JOB_KEY='homepage-structure'

          # Resolved-inputs banner — first thing in the step log so an
          # operator who jumps straight to the log can verify what we
          # parsed without scrolling. If a comment links to the wrong
          # line, this banner is the first place to look.
          echo "── Resolved inputs (PR comment step) ───────────────────────"
          echo "  Repository       : ${REPO}"
          echo "  PR number        : ${PR_NUMBER}"
          echo "  Head SHA         : ${HEAD_SHA}"
          echo "  Workflow YAML    : ${TARGET_WORKFLOW}"
          echo "  Workflow job key : ${TARGET_JOB_KEY}"
          echo "  Mode             : ${MODE}"
          echo "────────────────────────────────────────────────────────────"

          # Resolve the line number of the target job's `name:` field
          # at the PR's head SHA via a structural YAML walk
          # (scripts/resolve-workflow-job-name-line.mjs). The helper
          # exits non-zero with a precise diagnostic if the `jobs:`
          # block, the job key, or its `name:` field is missing —
          # `set -e` then fails this step before posting a comment
          # with a wrong-line link. No silent fallback.
          NAME_LINE=$(node scripts/resolve-workflow-job-name-line.mjs \
            "${TARGET_WORKFLOW}" \
            "${TARGET_JOB_KEY}")
          echo "Resolved \`jobs.${TARGET_JOB_KEY}.name\` to line ${NAME_LINE} of ${TARGET_WORKFLOW}"

          WORKFLOW_FILE_URL="${SERVER_URL}/${REPO}/blob/${HEAD_SHA}/${TARGET_WORKFLOW}"
          WORKFLOW_JOB_URL="${WORKFLOW_FILE_URL}#L${NAME_LINE}"
          # GitHub Actions UI listing of all runs for this workflow —
          # the fastest place to confirm the job's reported check name
          # ("Playwright — homepage structure (mobile breakpoints)")
          # against what's in branch protection.
          WORKFLOW_RUNS_URL="${SERVER_URL}/${REPO}/actions/workflows/$(basename "${TARGET_WORKFLOW}")"

          # Echo the fully-constructed deep links so operators can
          # copy-paste them straight from the step log without having
          # to render the PR comment first. Useful when the comment
          # POST itself fails (e.g. permissions glitch) but the URLs
          # are still needed for manual verification.
          echo "── PR comment deep-links ───────────────────────────────────"
          echo "  Workflow file : ${WORKFLOW_FILE_URL}"
          echo "  Job (line ${NAME_LINE}) : ${WORKFLOW_JOB_URL}"
          echo "  Workflow runs : ${WORKFLOW_RUNS_URL}"
          echo "────────────────────────────────────────────────────────────"

          # ── URL shape validation ────────────────────────────────────
          # Verify the three URLs match the exact GitHub patterns we
          # expect BEFORE assembling the comment body. A malformed URL
          # in a sticky PR comment is hard to notice — it just renders
          # as a broken link reviewers click once and forget about.
          # Failing here forces the workflow red so the comment is
          # never posted with garbage.
          #
          # Patterns enforced:
          #   file  https://<host>/<owner>/<repo>/blob/<sha40>/<path>
          #   job   <file-url>#L<positive-int>
          #   runs  https://<host>/<owner>/<repo>/actions/workflows/<file>.ya?ml
          #
          # `[[ … =~ … ]]` is bash's POSIX-extended-regex match. We
          # anchor with ^ and $ so partial matches don't sneak through.
          validation_errors=()
          # Tracks whether downstream URL-shape checks were skipped
          # because a critical foundational input (HEAD_SHA, REPO, or
          # SERVER_URL) was already malformed. Surfaced in the
          # consolidated log block so an operator can tell "no errors
          # reported for the URLs" apart from "URL checks never ran".
          early_exit_reason=""
          # Names of the specific phase-1 rules that tripped the
          # early-exit guard. Kept as a separate array (not just
          # parsed back out of validation_errors) so the consolidated
          # log can surface a single, unambiguous "failed_foundational
          # _rules" line — no string-matching on human-readable error
          # text, no ambiguity when phase 2 also reports errors in a
          # future refactor.
          failed_foundational_rules=()

          # Always derive basenames up front so the consolidated log
          # block below can print them, even when we early-exit before
          # the runs-URL checks. Defensive `?` / `#` strips defend
          # against a future change that adds a query string or
          # fragment to the runs URL.
          expected_basename=$(basename "${TARGET_WORKFLOW}")
          runs_basename="${WORKFLOW_RUNS_URL##*/}"
          runs_basename="${runs_basename%%\?*}"
          runs_basename="${runs_basename%%#*}"

          # ── Phase 1: foundational inputs ────────────────────────────
          # HEAD_SHA, REPO, and SERVER_URL are embedded into every
          # constructed URL. If any of them is malformed, every later
          # pattern check is guaranteed to fail for the same root
          # cause and would just spam the error list with noise that
          # buries the real problem. Collect all three first, then
          # early-exit before phase 2 if any failed.

          # 1. Sanity-check the head SHA is exactly 40 hex chars. If
          # this is wrong, every constructed URL is wrong, so check it
          # explicitly with a clearer message than the regex would give.
          if ! [[ "${HEAD_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            validation_errors+=("HEAD_SHA is not a 40-char lowercase hex sha: \"${HEAD_SHA}\"")
            failed_foundational_rules+=("HEAD_SHA")
          fi

          # 2. Repo must be "owner/repo" — disallow slashes in either
          # half so we can't accidentally smuggle path segments through.
          if ! [[ "${REPO}" =~ ^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$ ]]; then
            validation_errors+=("REPO is not in owner/repo form: \"${REPO}\"")
            failed_foundational_rules+=("REPO")
          fi

          # 3. Server URL must be https://<host> with no trailing slash.
          if ! [[ "${SERVER_URL}" =~ ^https://[A-Za-z0-9.-]+$ ]]; then
            validation_errors+=("SERVER_URL is not a bare https://<host>: \"${SERVER_URL}\"")
            failed_foundational_rules+=("SERVER_URL")
          fi

          # ── Early-exit guard ────────────────────────────────────────
          # Skip phase 2 (URL-shape checks) entirely when any
          # foundational input failed. We do NOT `exit` here — the
          # consolidated results block below must always print so the
          # operator sees the verdict, the inputs that failed, and a
          # clear "skipped" marker for the checks that never ran.
          # Phase-2 derived components — populated only when phase 2
          # actually runs. Defaults of "(skipped)" make it unambiguous in
          # the consolidated log when phase 1 short-circuited the run.
          normalized_server_url="(skipped)"
          normalized_repo="(skipped)"
          file_url_blob_path="(skipped)"
          job_url_anchor="(skipped)"
          runs_url_path="(skipped)"

          if (( ${#failed_foundational_rules[@]} > 0 )); then
            early_exit_reason="foundational input(s) malformed — skipped URL-shape checks"
          else
            # ── Phase 2: URL-shape checks ─────────────────────────────
            # Normalize foundational values used to BUILD the phase-2
            # regexes so the consolidated log shows the exact strings
            # interpolated into each pattern (trailing slashes stripped
            # from SERVER_URL, REPO surfaced verbatim). Also extract the
            # path/anchor pieces from each URL so an operator can diff
            # the derived parts against the inputs without re-parsing
            # the full URL by eye.
            normalized_server_url="${SERVER_URL%/}"
            normalized_repo="${REPO}"
            file_url_blob_path="${WORKFLOW_FILE_URL#${normalized_server_url}/${normalized_repo}/}"
            job_url_anchor="${WORKFLOW_JOB_URL##*#}"
            runs_url_path="${WORKFLOW_RUNS_URL#${normalized_server_url}/${normalized_repo}/}"

            # 4. Workflow file URL — must embed REPO and HEAD_SHA exactly.
            file_pattern="^${SERVER_URL}/${REPO}/blob/[0-9a-f]{40}/.+\.ya?ml$"
            if ! [[ "${WORKFLOW_FILE_URL}" =~ $file_pattern ]]; then
              validation_errors+=("WORKFLOW_FILE_URL does not match expected shape: \"${WORKFLOW_FILE_URL}\"")
            elif [[ "${WORKFLOW_FILE_URL}" != *"/${HEAD_SHA}/"* ]]; then
              validation_errors+=("WORKFLOW_FILE_URL does not embed HEAD_SHA \"${HEAD_SHA}\": \"${WORKFLOW_FILE_URL}\"")
            fi

            # 5. Job URL — file URL plus #L<positive-int>. Reject #L0 and
            # negative/zero-padded numbers because GitHub's anchor parser
            # treats them as invalid and the link silently jumps to top.
            job_pattern="^${SERVER_URL}/${REPO}/blob/[0-9a-f]{40}/.+\.ya?ml#L[1-9][0-9]*$"
            if ! [[ "${WORKFLOW_JOB_URL}" =~ $job_pattern ]]; then
              validation_errors+=("WORKFLOW_JOB_URL does not match expected shape: \"${WORKFLOW_JOB_URL}\"")
            elif [[ "${WORKFLOW_JOB_URL}" != "${WORKFLOW_FILE_URL}#L${NAME_LINE}" ]]; then
              validation_errors+=("WORKFLOW_JOB_URL does not equal WORKFLOW_FILE_URL#L${NAME_LINE}: \"${WORKFLOW_JOB_URL}\"")
            fi

            # 6. Runs URL — uses the workflow's basename, not its full path.
            runs_pattern="^${SERVER_URL}/${REPO}/actions/workflows/[A-Za-z0-9._-]+\.ya?ml$"
            if ! [[ "${WORKFLOW_RUNS_URL}" =~ $runs_pattern ]]; then
              validation_errors+=("WORKFLOW_RUNS_URL does not match expected shape: \"${WORKFLOW_RUNS_URL}\"")
            fi
            # 6a. The basename embedded in the runs URL must match the
            # basename of TARGET_WORKFLOW exactly. Catches a class of
            # bugs where someone refactors the basename derivation
            # (e.g. drops the extension, lowercases, or substitutes a
            # hard-coded string) and the URL still passes the shape
            # regex above but points at a DIFFERENT workflow's runs
            # listing — silently misleading every reviewer who clicks.
            #
            # Print a side-by-side comparison BEFORE the equality test
            # so a failed run shows the two values on adjacent log lines
            # — no scrolling, no copy-paste — and a passing run shows
            # the exact strings that were compared (proof of work).
            if [[ "${runs_basename}" == "${expected_basename}" ]]; then
              basename_match_marker="✅ match"
            else
              basename_match_marker="❌ differ"
            fi
            echo "── phase-2 basename comparison ────────────────────────────"
            echo "  expected (from TARGET_WORKFLOW)   : \"${expected_basename}\""
            echo "  actual   (from WORKFLOW_RUNS_URL) : \"${runs_basename}\""
            echo "  result                            : ${basename_match_marker}"
            echo "───────────────────────────────────────────────────────────"
            if [[ "${runs_basename}" != "${expected_basename}" ]]; then
              validation_errors+=(
                "WORKFLOW_RUNS_URL basename \"${runs_basename}\" does not match basename of TARGET_WORKFLOW \"${expected_basename}\" (TARGET_WORKFLOW=\"${TARGET_WORKFLOW}\", URL=\"${WORKFLOW_RUNS_URL}\")"
              )
            fi
          fi

          # ── Consolidated URL validation results ─────────────────────
          # ONE place that lists every input AND every derived value
          # involved in URL construction. Always printed (success or
          # failure) so an operator chasing a wrong link can read this
          # single block instead of stitching together the earlier
          # banners. Field order mirrors the construction order, so
          # reading top-to-bottom is also a derivation walkthrough.
          if (( ${#validation_errors[@]} > 0 )); then
            verdict="❌ FAIL (${#validation_errors[@]} error(s))"
          else
            verdict="✅ PASS"
          fi
          echo "── URL validation results ─────────────────────────────────"
          echo "  verdict             : ${verdict}"
          # Dedicated, machine-greppable line that names exactly which
          # phase-1 rule(s) tripped the early-exit guard. Always
          # printed (value is "none" when phase 1 passed) so log
          # scrapers and humans alike get a stable field instead of
          # having to infer it from the presence/absence of other
          # lines. Joined with "," when multiple rules failed.
          if (( ${#failed_foundational_rules[@]} > 0 )); then
            failed_foundational_csv=$(IFS=,; echo "${failed_foundational_rules[*]}")
          else
            failed_foundational_csv="none"
          fi
          echo "  failed_foundational : ${failed_foundational_csv}"
          if [[ -n "${early_exit_reason}" ]]; then
            echo "  early-exit          : ${early_exit_reason}"
          fi
          echo "  ── inputs ──"
          echo "  SERVER_URL          : \"${SERVER_URL}\""
          echo "  REPO                : \"${REPO}\""
          echo "  HEAD_SHA            : \"${HEAD_SHA}\""
          echo "  TARGET_WORKFLOW     : \"${TARGET_WORKFLOW}\""
          echo "  TARGET_JOB_KEY      : \"${TARGET_JOB_KEY}\""
          echo "  NAME_LINE           : \"${NAME_LINE}\""
          echo "  ── derived ──"
          echo "  expected_basename   : \"${expected_basename}\""
          echo "  runs_basename       : \"${runs_basename}\""
          echo "  WORKFLOW_FILE_URL   : \"${WORKFLOW_FILE_URL}\""
          echo "  WORKFLOW_JOB_URL    : \"${WORKFLOW_JOB_URL}\""
          echo "  WORKFLOW_RUNS_URL   : \"${WORKFLOW_RUNS_URL}\""
          # Phase-2 normalized inputs and URL component breakdown.
          # Values are "(skipped)" when phase 2 did not run so the
          # operator can see at a glance which checks the verdict
          # actually covers.
          echo "  ── phase-2 components ──"
          echo "  normalized_server   : \"${normalized_server_url}\""
          echo "  normalized_repo     : \"${normalized_repo}\""
          echo "  file_url_blob_path  : \"${file_url_blob_path}\""
          echo "  job_url_anchor      : \"${job_url_anchor}\""
          echo "  runs_url_path       : \"${runs_url_path}\""
          if (( ${#validation_errors[@]} > 0 )); then
            echo "  ── errors ──"
            for e in "${validation_errors[@]}"; do
              echo "  - ${e}"
            done
            if [[ -n "${early_exit_reason}" ]]; then
              echo "  ── note ──"
              echo "  URL-shape checks (rules 4–6a) were SKIPPED. Fix the"
              echo "  foundational input error(s) above and re-run to see"
              echo "  any remaining URL-shape failures."
            fi
          fi
          # One-line phase summary at the very bottom of the block so an
          # operator scrolling to the end (or grepping for "summary") can
          # tell at a glance which phase(s) failed and why, without
          # re-reading the verdict + errors + early-exit fields above.
          # Phase-2 error count = total errors minus phase-1 failures
          # (every phase-1 failure pushes one entry into validation_errors,
          # and phase 2 only runs when phase 1 had zero failures).
          phase1_failed_count=${#failed_foundational_rules[@]}
          phase2_failed_count=$(( ${#validation_errors[@]} - phase1_failed_count ))
          if (( phase1_failed_count > 0 && phase2_failed_count > 0 )); then
            # Should be unreachable today (phase 2 is gated on phase-1
            # success) but kept for future-proofing if the gate is ever
            # relaxed. Surfaces both failure sources unambiguously.
            phase_summary="summary: ❌ phase 1 + phase 2 failed — phase 1: ${failed_foundational_csv}; phase 2: ${phase2_failed_count} URL-shape error(s)"
          elif (( phase1_failed_count > 0 )); then
            phase_summary="summary: ❌ phase 1 failed (${failed_foundational_csv}) — phase 2 skipped"
          elif (( phase2_failed_count > 0 )); then
            phase_summary="summary: ❌ phase 2 failed — ${phase2_failed_count} URL-shape error(s) (phase 1 OK)"
          else
            phase_summary="summary: ✅ phase 1 + phase 2 passed"
          fi
          echo "  ${phase_summary}"
          echo "────────────────────────────────────────────────────────────"

          # Emit machine-readable step outputs so downstream jobs can
          # `needs.<job>.outputs.*` and react precisely to URL-validation
          # failures WITHOUT scraping this step's log. Always written
          # (pass and fail), so consumers can branch on a stable schema.
          #
          # Exit codes are distinct per failure source so a workflow
          # gate (or `continue-on-error: false` consumer) can `case` on
          # the numeric code without needing the outputs at all:
          #   0   url validation passed
          #   11  phase-1 failure only       (foundational inputs)
          #   12  phase-2 failure only       (URL-shape / basename)
          #   13  phase-1 + phase-2 failed   (currently unreachable —
          #                                   reserved for the day the
          #                                   early-exit guard is relaxed)
          if (( phase1_failed_count > 0 && phase2_failed_count > 0 )); then
            url_validation_status="phase1_and_phase2_failed"
            url_validation_exit_code=13
          elif (( phase1_failed_count > 0 )); then
            url_validation_status="phase1_failed"
            url_validation_exit_code=11
          elif (( phase2_failed_count > 0 )); then
            url_validation_status="phase2_failed"
            url_validation_exit_code=12
          else
            url_validation_status="passed"
            url_validation_exit_code=0
          fi
          {
            echo "url_validation_status=${url_validation_status}"
            echo "url_validation_exit_code=${url_validation_exit_code}"
            echo "url_validation_phase1_failed=$([[ ${phase1_failed_count} -gt 0 ]] && echo true || echo false)"
            echo "url_validation_phase2_failed=$([[ ${phase2_failed_count} -gt 0 ]] && echo true || echo false)"
            echo "url_validation_phase1_rules=${failed_foundational_csv}"
            echo "url_validation_phase2_error_count=${phase2_failed_count}"
          } >> "$GITHUB_OUTPUT"

          if (( ${#validation_errors[@]} > 0 )); then
            echo "❌ Refusing to post PR comment — see URL validation results above."
            echo "   step output url_validation_status=${url_validation_status}, exit code=${url_validation_exit_code}"
            exit "${url_validation_exit_code}"
          fi

          # Fence the script output in a code block; truncate to keep
          # the comment under GitHub's 65,536-char body limit with
          # generous headroom.
          OUTPUT=$(head -c 50000 enforcer-output.log)

          BODY=$(cat <<EOF
${MARKER}
### Required-check enforcer — ${HEADLINE}

| Field | Value |
| --- | --- |
| Mode | \`${MODE}\` |
