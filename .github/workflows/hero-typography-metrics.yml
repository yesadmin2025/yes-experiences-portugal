name: Hero Typography Metrics

# Runs the hero typography metrics regression on every PR.
# Captures computed font-family/weight/size, line-height (leading),
# letter-spacing (tracking), and block top/bottom/baseline positions
# for every hero text node, on mobile (Pixel 5) and desktop (1366×768),
# and compares against the approved baselines in
# e2e/__baselines__/hero-typography-<project>.json.
#
# Drift fails the build. To regenerate baselines after an intentional
# design change run locally:
#   UPDATE_HERO_TYPO_BASELINE=1 bunx playwright test \
#     hero-typography-metrics --project=mobile-chromium
#   UPDATE_HERO_TYPO_BASELINE=1 bunx playwright test \
#     hero-typography-metrics --project=desktop-chromium
# and commit the updated JSON baselines alongside the design change.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hero-typography-metrics-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typography-metrics:
    name: Hero typography metrics (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        project: [mobile-chromium, desktop-chromium]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json', 'bun.lockb') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium + system deps
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      - name: Run hero typography metrics regression
        # Scoped to the metrics spec only. Compares the live computed
        # geometry against e2e/__baselines__/hero-typography-${project}.json.
        # Any leading/tracking/baseline drift outside tolerance fails here.
        run: bunx playwright test e2e/hero-typography-metrics.spec.ts --project=${{ matrix.project }}
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hero-typography-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload current vs baseline snapshot (on failure)
        # The spec attaches the live `current-<project>.json` to the
        # test result, and the baseline lives in the repo. Uploading
        # test-results/ surfaces both side by side for reviewers.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hero-typography-drift-${{ matrix.project }}
          path: |
            test-results/
            e2e/__baselines__/hero-typography-${{ matrix.project }}.json
          retention-days: 14
