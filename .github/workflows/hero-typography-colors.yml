name: Hero Typography Colors

# Runs the hero typography color regression on every PR.
# Validates the *computed* foreground colors of the hero eyebrow and
# headline against the canonical YES brand palette:
#   • Teal      #295B61   (--teal)
#   • Gold      #C9A96A   (--gold)        contained accent
#   • Gold-soft #E1CFA6   (--gold-soft)   gold on dark surfaces
#   • Ivory     #FAF8F3   (--ivory)
#   • Charcoal  #2E2E2E   (--charcoal)
#
# Per-element contract:
#   eyebrow        → gold OR gold-soft
#   headlineLine1  → ivory (over dark hero film) OR teal/charcoal
#   headlineLine2  → ivory (over dark hero film) OR teal
# Both lines must come from the same surface family.
#
# Tolerance ±10/255 per channel absorbs anti-alias + color-mix jitter.
# Any token drift fails the build.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: hero-typography-colors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typography-colors:
    name: Hero typography colors (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        project: [mobile-chromium, desktop-chromium]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package.json', 'bun.lockb') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium + system deps
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            bunx playwright install-deps chromium
          else
            bunx playwright install --with-deps chromium
          fi

      - name: Run hero typography colors regression
        run: bunx playwright test e2e/hero-typography-colors.spec.ts --project=${{ matrix.project }}
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hero-typography-colors-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hero-typography-colors-drift-${{ matrix.project }}
          path: test-results/
          retention-days: 14
