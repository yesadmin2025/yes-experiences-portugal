name: Lighthouse CI (Home + key routes)

# Lightweight Lighthouse runs against the home page, hero verification
# page, builder, and experiences index — to catch performance regressions
# that could affect hero video playback + chapter overlay timing across
# the high-traffic editorial routes (long tasks, render-blocking JS,
# oversized assets, layout shifts).
#
# Two passes: desktop (.lighthouserc.json) and mobile
# (.lighthouserc.mobile.json) — mobile uses Slow 4G throttling + 4x CPU
# slowdown so we catch overlay-timing regressions on the smaller devices
# the team actually browses on (per Core memory, mobile-first).
#
# Budgets are intentionally lenient — these are guards against major
# regressions, not strict performance gates. Tighten thresholds once a
# baseline is established.
on:
  pull_request:
  push:
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse (${{ matrix.preset }})
    runs-on: ubuntu-latest
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: desktop
            config: ./.lighthouserc.json
          - preset: mobile
            config: ./.lighthouserc.mobile.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node (for Lighthouse CI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build production bundle
        run: bun run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x

      - name: Run Lighthouse CI (${{ matrix.preset }})
        run: lhci autorun --config=${{ matrix.config }}
        env:
          LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.sha }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-${{ matrix.preset }}
          path: .lighthouseci/
          retention-days: 14
